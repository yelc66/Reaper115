<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reaper115 · Web admin UI kit</title>
  <link rel="icon" type="image/png" href="../../assets/favicon/favicon-32.png" />
  <link rel="stylesheet" href="web-kit.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="SehuaData.jsx"></script>
  <script type="text/babel" src="Strategy.jsx"></script>
  <script type="text/babel" src="Tasks.jsx"></script>
  <script type="text/babel" src="Crawl.jsx"></script>
  <script type="text/babel" src="Config.jsx"></script>

  <script type="text/babel">
    // Page router. URL hash drives which screen renders so we can deep-link
    // and the browser back/forward buttons feel native.
    const PAGES = {
      login:     { title: "Sign in",      sub: "",                                    render: () => <Login /> },
      dashboard: { title: "Dashboard",    sub: "Live · refreshed 12s ago",            render: () => <Dashboard /> },
      sehua:     { title: "Sehua data",   sub: "1,184 posts · 4 sections",            render: () => <SehuaData /> },
      strategy:  { title: "Strategy",     sub: "crawler.yaml · synced 04:00 UTC",     render: () => <Strategy /> },
      tasks:     { title: "Tasks",        sub: "14 pending · 7 failed",               render: () => <Tasks /> },
      crawl:     { title: "Crawl",        sub: "Manual run · SSE log",                render: () => <Crawl /> },
      config:    { title: "Config",       sub: "Runtime config · log + bot + 115 + AI", render: () => <Config /> },
    };

    // ── Tweak defaults: surface visual + page levers from the kit ──
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "page": "crawl",
      "accent": "#007AFF",
      "density": "comfortable",
      "showSidebar": true,
      "glassIntensity": 0.63
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const initial = (location.hash || "#" + (t.page || "dashboard")).slice(1);
      const [page, setPage] = React.useState(PAGES[initial] ? initial : "dashboard");
      React.useEffect(() => {
        const onHash = () => {
          const next = (location.hash || "#dashboard").slice(1);
          if (PAGES[next]) setPage(next);
        };
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);
      // When the user picks a page in the tweaks panel, navigate.
      React.useEffect(() => {
        if (t.page && PAGES[t.page] && t.page !== page) {
          location.hash = "#" + t.page;
          setPage(t.page);
        }
      }, [t.page]);

      const go = (id) => {
        location.hash = "#" + id;
        setPage(id);
        setTweak("page", id);
      };

      // Apply tweak side-effects: accent color, glass intensity, density.
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty("--r115-primary", t.accent);
        // shift CTA shadow tint to follow the chosen accent
        const rgb = hexToRgb(t.accent);
        root.style.setProperty("--shadow-cta",       `0 8px 18px ${rgba(rgb, 0.22)}`);
        root.style.setProperty("--shadow-cta-hover", `0 12px 24px ${rgba(rgb, 0.32)}`);
        root.style.setProperty("--glass-fill-card", `rgba(255,255,255,${t.glassIntensity})`);
        root.style.setProperty("--glass-fill-sidebar", `rgba(255,255,255,${Math.min(1, t.glassIntensity + 0.1)})`);
        document.body.dataset.density = t.density;
      }, [t.accent, t.glassIntensity, t.density]);

      function hexToRgb(hex) {
        const safe = (hex || "#007AFF").replace("#", "");
        const v = safe.length === 3 ? safe.split("").map((c) => c + c).join("") : safe;
        const n = parseInt(v, 16);
        return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
      }
      function rgba([r, g, b], a) { return `rgba(${r},${g},${b},${a})`; }

      const TweakPanel = (
        <TweaksPanel title="Tweaks" defaultOpen={false}>
          <TweakSection title="Navigation">
            <TweakSelect
              label="Page"
              value={t.page}
              onChange={(v) => setTweak("page", v)}
              options={[
                { value: "login",     label: "Sign in" },
                { value: "dashboard", label: "Dashboard" },
                { value: "sehua",     label: "Sehua data" },
                { value: "strategy",  label: "Strategy" },
                { value: "tasks",     label: "Tasks" },
                { value: "crawl",     label: "Crawl" },
                { value: "config",    label: "Config" },
              ]}
            />
            <TweakToggle
              label="Sidebar"
              value={t.showSidebar}
              onChange={(v) => setTweak("showSidebar", v)}
            />
          </TweakSection>

          <TweakSection title="Theme">
            <TweakColor
              label="Accent"
              value={t.accent}
              onChange={(v) => setTweak("accent", v)}
              options={["#007AFF", "#34C759", "#AF52DE", "#FF9500", "#FF3B30", "#1C1C1E"]}
            />
            <TweakRadio
              label="Density"
              value={t.density}
              onChange={(v) => setTweak("density", v)}
              options={[
                { value: "compact",     label: "Compact" },
                { value: "comfortable", label: "Comfort" },
              ]}
            />
            <TweakSlider
              label="Glass opacity"
              min={0.3} max={0.95} step={0.01}
              value={t.glassIntensity}
              onChange={(v) => setTweak("glassIntensity", v)}
              format={(v) => Math.round(v * 100) + "%"}
            />
          </TweakSection>
        </TweaksPanel>
      );

      if (page === "login") {
        return <>{PAGES.login.render()}{TweakPanel}</>;
      }

      return (
        <>
          {t.showSidebar
            ? <AppShell active={page} onNavigate={go} title={PAGES[page].title} sub={PAGES[page].sub}>
                {PAGES[page].render()}
              </AppShell>
            : <main className="main">
                <TopBar title={PAGES[page].title} sub={PAGES[page].sub} />
                <div className="page">{PAGES[page].render()}</div>
              </main>}
          {TweakPanel}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
