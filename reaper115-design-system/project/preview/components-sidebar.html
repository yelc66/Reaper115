<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Sidebar nav</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { padding: 20px 24px; }
  .nav {
    width: 220px;
    background: var(--glass-fill-sidebar);
    border: 1px solid var(--glass-border);
    border-radius: var(--r-md);
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow-glass);
    overflow: hidden;
  }
  .logobar { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.6); }
  .logo { width: 32px; height: 32px; border-radius: 8px; box-shadow: 0 8px 18px rgba(0,122,255,0.18); }
  .brand .name { display: block; font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--r115-ink); }
  .brand .sub  { display: block; font-size: 10px; color: var(--r115-primary); }
  .items { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .item { display: flex; align-items: center; gap: 10px; height: 30px; padding: 0 10px; border-radius: var(--r-md); font: 500 13px/1 var(--font-sans); color: hsl(var(--muted-foreground)); transition: all .2s; }
  .item.active { background: var(--r115-primary); color: white; box-shadow: 0 8px 20px rgba(0,122,255,0.24); }
  .item.hover { background: rgba(255,255,255,0.55); color: var(--r115-ink); }
  .item svg { width: 14px; height: 14px; flex-shrink: 0; }
</style></head>
<body><div class="card-stage"><div class="nav">
  <div class="logobar">
    <img class="logo" src="../assets/logo/sehuatang-115-bot.svg" alt="">
    <div class="brand"><span class="name">Reaper115</span><span class="sub">Telegram 管理控制台</span></div>
  </div>
  <div class="items">
    <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="m13.41 10.59 2.83-2.83"/><path d="M3 12a9 9 0 0 1 9-9"/><path d="M18.36 6.64A9 9 0 0 1 21 12"/><path d="M6 12a6 6 0 0 1 9-5.196"/></svg>Dashboard</div>
    <div class="item hover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="11" y2="6"/><line x1="14" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="17" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="12" cy="6" r="2"/><circle cx="15" cy="12" r="2"/><circle cx="10" cy="18" r="2"/></svg>配置管理</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>爬虫配置</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>涩花数据</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 12h-5"/><path d="M15 8h-5"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M21 17v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2h18Z"/></svg>离线任务</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>爬取控制</div>
  </div>
</div></div></body></html>
