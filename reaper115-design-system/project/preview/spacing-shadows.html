<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Shadow ladder</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { padding: 28px 28px 22px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; width: 100%; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tile {
    width: 90px; height: 56px;
    background: white; border-radius: var(--r-md);
    border: 1px solid rgba(255,255,255,0.7);
  }
  .blue { background: var(--r115-primary); border: none; }
  .lbl { font-size: 11px; font-weight: 600; color: var(--r115-ink); }
  .meta { font-size: 9px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-align: center; line-height: 1.4; }
</style></head>
<body><div class="card-stage">
  <div class="row">
    <div class="item">
      <div class="tile" style="box-shadow: 0 6px 20px rgba(28,28,30,0.06)"></div>
      <div class="lbl">soft</div>
      <div class="meta">6/20<br>0.06</div>
    </div>
    <div class="item">
      <div class="tile" style="box-shadow: var(--shadow-panel)"></div>
      <div class="lbl">panel · card</div>
      <div class="meta">18/48<br>0.12</div>
    </div>
    <div class="item">
      <div class="tile" style="box-shadow: var(--shadow-glass)"></div>
      <div class="lbl">glass · sidebar</div>
      <div class="meta">24/60<br>0.14</div>
    </div>
    <div class="item">
      <div class="tile blue" style="box-shadow: var(--shadow-cta)"></div>
      <div class="lbl">cta</div>
      <div class="meta">12/28<br>blue 0.28</div>
    </div>
    <div class="item">
      <div class="tile blue" style="box-shadow: var(--shadow-cta-hover)"></div>
      <div class="lbl">cta hover</div>
      <div class="meta">16/36<br>blue 0.34</div>
    </div>
  </div>
</div></body></html>
