<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { align-items: flex-start; }
  .stack { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .lbl { font-size: 11px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); width: 90px; }
  button { font-family: var(--font-sans); cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 32px; padding: 0 14px; font: 500 14px/1 var(--font-sans); border-radius: var(--r-md); border: none; transition: all .2s; }
  .primary { background: var(--r115-primary); color: white; box-shadow: var(--shadow-cta); }
  .primary.hover { transform: translateY(-2px); box-shadow: var(--shadow-cta-hover); background: #0070F0; }
  .secondary { background: rgba(255,255,255,0.58); color: var(--r115-ink); border: 1px solid rgba(255,255,255,0.7); backdrop-filter: blur(20px); box-shadow: var(--shadow-card-soft); }
  .ghost { background: transparent; color: hsl(var(--muted-foreground)); }
  .danger { background: rgba(255,59,48,0.10); color: #D8281D; border: 1px solid rgba(255,59,48,0.20); }
  .icon-btn { width: 32px; height: 32px; padding: 0; }
  .disabled { opacity: 0.4; cursor: not-allowed; }
  svg { width: 14px; height: 14px; }
</style></head>
<body><div class="card-stage"><div class="stack">
  <div class="row">
    <div class="lbl">Primary</div>
    <button class="btn primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      保存
    </button>
    <button class="btn primary hover">开始爬取</button>
    <button class="btn primary disabled">禁用</button>
  </div>
  <div class="row">
    <div class="lbl">Secondary</div>
    <button class="btn secondary">取消</button>
    <button class="btn secondary">重置</button>
    <button class="btn secondary icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
  </div>
  <div class="row">
    <div class="lbl">Ghost</div>
    <button class="btn ghost">退出登录</button>
    <button class="btn ghost icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><polyline points="21 3 21 8 16 8"/></svg></button>
  </div>
  <div class="row">
    <div class="lbl">Danger</div>
    <button class="btn danger">清空待重试</button>
  </div>
</div></div></body></html>
