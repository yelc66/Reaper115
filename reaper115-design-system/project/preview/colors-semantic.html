<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Semantic accents</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }
  .item { display: flex; flex-direction: column; gap: 8px; }
  .swatch {
    height: 60px; border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 13px;
    box-shadow: var(--shadow-card-soft);
  }
  .badge {
    display: inline-flex; align-items: center; height: 22px; padding: 0 8px;
    border-radius: var(--r-xs); font-size: 12px; font-weight: 500;
  }
  .meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .meta .name { font-size: 12px; font-weight: 600; color: var(--r115-ink); }
  .meta .hex  { font-family: var(--font-mono); font-size: 11px; color: hsl(var(--muted-foreground)); }
</style></head>
<body><div class="card-stage">
  <div class="row">
    <div class="item">
      <div class="swatch" style="background:#34C759">Success</div>
      <div class="meta"><span class="badge" style="background:rgba(52,199,89,0.12);color:#2BA84A">已离线</span><span class="hex">#34C759</span></div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#FF9500">Warning</div>
      <div class="meta"><span class="badge" style="background:rgba(255,149,0,0.12);color:#C97400">待处理</span><span class="hex">#FF9500</span></div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#FF3B30">Destructive</div>
      <div class="meta"><span class="badge" style="background:rgba(255,59,48,0.12);color:#D8281D">异常</span><span class="hex">#FF3B30</span></div>
    </div>
    <div class="item">
      <div class="swatch" style="background:#5856D6">Violet</div>
      <div class="meta"><span class="badge" style="background:rgba(88,86,214,0.12);color:#4744B5">计划</span><span class="hex">#5856D6</span></div>
    </div>
  </div>
</div></body></html>
