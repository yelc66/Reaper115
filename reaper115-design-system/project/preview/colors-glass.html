<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Glass surfaces</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { padding: 0; }
  .stage {
    position: relative; width: 100%; height: 230px;
    background: var(--bg-page);
    padding: 22px;
  }
  .stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle at 20% 30%, rgba(90,203,250,0.45), transparent 18rem),
      radial-gradient(circle at 80% 20%, rgba(176,217,255,0.55), transparent 18rem);
  }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; position: relative; height: 100%; }
  .surface {
    border-radius: var(--r-md);
    padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
  }
  .s-sidebar { background: var(--glass-fill-sidebar); border: 1px solid var(--glass-border); box-shadow: var(--shadow-glass); }
  .s-card    { background: var(--glass-fill-card);    border: 1px solid var(--glass-border); box-shadow: var(--shadow-panel); }
  .s-inset   { background: var(--glass-fill-inset);  }
  .lbl  { font-size: 12px; font-weight: 600; color: var(--r115-ink); }
  .meta { font-size: 11px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); line-height: 1.5; }
</style></head>
<body><div class="stage">
  <div class="row">
    <div class="surface s-sidebar">
      <span class="lbl">Sidebar / sticky header</span>
      <span class="meta">rgba(255,255,255,.55)<br>blur 20 · shadow-glass</span>
    </div>
    <div class="surface s-card">
      <span class="lbl">Card</span>
      <span class="meta">rgba(255,255,255,.62)<br>blur 20 · shadow-panel</span>
    </div>
    <div class="surface s-inset">
      <span class="lbl">Inset row</span>
      <span class="meta">rgba(255,255,255,.46)<br>inherits parent blur</span>
    </div>
  </div>
</div></body></html>
