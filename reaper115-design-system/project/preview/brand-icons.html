<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Brand icons</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { padding: 18px; align-items: flex-start; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; width: 100%; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tile { width: 56px; height: 56px; border-radius: 12px; box-shadow: var(--shadow-card-soft); display: block; }
  .name { font-size: 10px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); }
</style></head>
<body><div class="card-stage"><div class="grid">
  <div class="item"><img class="tile" src="../assets/icons/upload_128.png" alt=""><span class="name">upload</span></div>
  <div class="item"><img class="tile" src="../assets/icons/download_128.png" alt=""><span class="name">download</span></div>
  <div class="item"><img class="tile" src="../assets/icons/share_link_128.png" alt=""><span class="name">share_link</span></div>
  <div class="item"><img class="tile" src="../assets/icons/cloud_115_file_128.png" alt=""><span class="name">cloud_115</span></div>
  <div class="item"><img class="tile" src="../assets/icons/settings_128.png" alt=""><span class="name">settings</span></div>
  <div class="item"><img class="tile" src="../assets/icons/security_128.png" alt=""><span class="name">security</span></div>
  <div class="item"><img class="tile" src="../assets/icons/help_128.png" alt=""><span class="name">help</span></div>
  <div class="item"><img class="tile" src="../assets/icons/telegram_128.png" alt=""><span class="name">telegram</span></div>
</div></div></body></html>
