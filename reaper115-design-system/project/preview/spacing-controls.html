<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Control heights</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { align-items: flex-start; }
  .stack { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .row { display: grid; grid-template-columns: 1fr 110px; align-items: center; gap: 14px; }
  .ruler { display: flex; align-items: center; gap: 12px; }
  .meta { font-size: 11px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); text-align: right; }
  .name { font-size: 12px; color: var(--r115-ink); font-weight: 500; min-width: 90px; }
  /* mock controls */
  .btn-md { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px; border: none; background: var(--r115-primary); color: white; font: 500 14px/1 var(--font-sans); border-radius: var(--r-md); box-shadow: var(--shadow-cta); }
  .btn-sm { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px; border: none; background: rgba(255,255,255,0.6); color: var(--r115-ink); font: 500 12px/1 var(--font-sans); border-radius: var(--r-md); border: 1px solid rgba(255,255,255,0.7); }
  .input { height: 32px; width: 220px; border-radius: var(--r-md); border: 1px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.62); padding: 0 12px; font: 14px/1 var(--font-sans); color: hsl(var(--muted-foreground)); display: inline-flex; align-items: center; }
  .switch { position: relative; width: 36px; height: 20px; border-radius: 999px; background: var(--r115-primary); }
  .switch::after { content: ""; position: absolute; top: 2px; left: 18px; width: 16px; height: 16px; border-radius: 999px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
</style></head>
<body><div class="card-stage"><div class="stack">
  <div class="row"><div class="ruler"><span class="name">Button md</span><button class="btn-md">保存</button></div><span class="meta">h-8 · 32</span></div>
  <div class="row"><div class="ruler"><span class="name">Button sm</span><button class="btn-sm">取消</button></div><span class="meta">h-7 · 28</span></div>
  <div class="row"><div class="ruler"><span class="name">Input</span><span class="input">www.sehuatang.net</span></div><span class="meta">h-8 · 32</span></div>
  <div class="row"><div class="ruler"><span class="name">Switch</span><span class="switch"></span></div><span class="meta">h-5 · 20</span></div>
</div></div></body></html>
