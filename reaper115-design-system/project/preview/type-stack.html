<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><title>Font stack &amp; weights</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  body { align-items: flex-start; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
  .panel { padding: 14px; border-radius: var(--r-md); border: 1px solid rgba(28,28,30,0.06); background: rgba(255,255,255,0.62); }
  .panel h3 { margin: 0 0 8px; font-size: 12px; color: hsl(var(--muted-foreground)); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .stack-name { font-family: var(--font-sans); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .stack-list { font-family: var(--font-mono); font-size: 11px; color: hsl(var(--muted-foreground)); line-height: 1.6; margin-top: 6px; }
  .weights { display: flex; flex-direction: column; gap: 4px; }
  .weights div { font-size: 18px; font-family: var(--font-sans); }
  .w-lab { font-size: 10px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); margin-left: 8px; }
</style></head>
<body><div class="card-stage"><div class="grid">
  <div class="panel">
    <h3>Sans · Latin + 中文</h3>
    <div class="stack-name">SF Pro Display</div>
    <div class="stack-list">"SF Pro Display", Inter, ui-sans-serif,<br>system-ui, -apple-system, "Segoe UI"</div>
  </div>
  <div class="panel">
    <h3>Weights in use</h3>
    <div class="weights">
      <div style="font-weight:400">Reaper115 资源 <span class="w-lab">400 Regular</span></div>
      <div style="font-weight:500">Reaper115 资源 <span class="w-lab">500 Medium</span></div>
      <div style="font-weight:600">Reaper115 资源 <span class="w-lab">600 Semibold</span></div>
    </div>
  </div>
</div></div></body></html>
