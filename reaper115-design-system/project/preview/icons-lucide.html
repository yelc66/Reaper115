<!doctype html>

  .name { font-size: 10px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); }
  svg { stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }
</style></head>
