<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_card_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; }
  .swatch {
    aspect-ratio: 1 / 1.05;
    border-radius: var(--r-md);
    padding: 10px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: white;
    box-shadow: var(--shadow-card-soft);
    border: 1px solid rgba(255,255,255,0.6);
  }
  .swatch.lt { color: var(--r115-ink); border-color: rgba(0,0,0,0.06); }
  .name { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }
  .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.92; }
</style></head>
<body><div class="card-stage">
  <div class="row">
    <div class="swatch" style="background:#007AFF"><span class="name">Primary</span><span class="hex">#007AFF</span></div>
    <div class="swatch" style="background:#5ACBFA"><span class="name">Cyan</span><span class="hex">#5ACBFA</span></div>
    <div class="swatch lt" style="background:#B0D9FF"><span class="name">Sky</span><span class="hex">#B0D9FF</span></div>
    <div class="swatch lt" style="background:#E5F2FF"><span class="name">Mist</span><span class="hex">#E5F2FF</span></div>
    <div class="swatch lt" style="background:#FFFFFF"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
    <div class="swatch" style="background:#1C1C1E"><span class="name">Ink</span><span class="hex">#1C1C1E</span></div>
    <div class="swatch" style="background:#8E8E93"><span class="name">Slate</span><span class="hex">#8E8E93</span></div>
  </div>
</div></body></html>
